<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnePost · 一键多平台发布</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#8b5cf6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="OnePost">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="container">
  <header>
    <h1><img src="icon.png" alt="" class="logo">OnePost</h1>
    <p class="sub">一次创作，多平台发布 · 自动识别内容并匹配平台规范</p>
    <div class="settings-entry">
      <button id="btn-settings" class="btn small">⚙️ 账号设置</button>
      <button id="btn-stats" class="btn small">📊 数据看板</button>
    </div>
  </header>

  <section class="card">
    <input id="title" type="text" placeholder="标题（小红书 / YouTube / B站 等平台需要，可留空）" maxlength="100">
    <textarea id="text" rows="6"
      placeholder="输入文字内容，或粘贴一个网页 / 视频链接自动转载…"></textarea>

    <div id="link-bar" class="link-bar hidden">
      <span>检测到链接：<a id="link-url" target="_blank" rel="noopener"></a></span>
      <button id="btn-extract" class="btn small">解析并转载</button>
      <span id="extract-status" class="muted"></span>
    </div>

    <div id="dropzone" class="dropzone">
      <input id="file-input" type="file" multiple hidden
        accept="image/*,video/*,audio/*">
      <span>拖拽或 <u>点击上传</u> 图片 / 视频 / 音乐</span>
    </div>
    <div id="media-list" class="media-list"></div>
  </section>

  <section class="card">
    <div class="row-between">
      <h2>发布平台 <span id="ctype-badge" class="badge hidden"></span></h2>
      <span class="muted">已根据内容自动勾选推荐平台</span>
    </div>
    <div id="platforms" class="platforms">
      <p class="muted">输入内容后自动匹配…</p>
    </div>
  </section>

  <div class="actions">
    <button id="btn-publish" class="btn primary" disabled>发 布</button>
  </div>

  <section id="results" class="card hidden">
    <h2>发布结果</h2>
    <div id="results-list"></div>
  </section>
</main>
<div id="settings-modal" class="modal hidden">
  <div class="modal-card">
    <div class="row-between modal-head">
      <h2>平台账号设置</h2>
      <button id="btn-settings-close" class="btn small">✕</button>
    </div>
    <p class="muted settings-note">凭据仅保存在本机 config.yaml（不会上传），界面中打码显示。
      到期后自动失效，发布将降级为草稿模式。</p>
    <div id="settings-list"></div>
  </div>
</div>
<div id="stats-modal" class="modal hidden">
  <div class="modal-card wide">
    <div class="row-between modal-head">
      <h2 id="stats-title">数据看板</h2>
      <div>
        <button id="btn-stats-back" class="btn small hidden">← 返回</button>
        <button id="btn-stats-refresh" class="btn small">⟳ 刷新数据</button>
        <button id="btn-stats-close" class="btn small">✕</button>
      </div>
    </div>
    <p class="muted settings-note">已配置凭据的平台可自动拉取；其他平台可在详情页手动记录数据，形成趋势。</p>
    <div id="stats-overview" class="stats-grid"></div>
    <div id="stats-detail" class="hidden"></div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
